version: '3'

services:

  db:
    image: mysql:5.7
    command: --innodb-use-native-aio=0
    container_name: db
    restart: always
    tty: true
    volumes:
      - ./mysql:/var/lib/mysql
    environment:
      - MYSQL_DATABASE=nodedb
      - MYSQL_ROOT_PASSWORD=root
    networks:
      - node-network
    #ports:
      #- '3306:3306'

  app:
    build:
      context: node
    container_name: app    
    volumes:
      - ./node:/usr/src/app
    networks:
      - node-network  
    #ports:
      #- "3000:3000"  
    tty: true
    depends_on:
      - db

  nginx:
    build:
      context: ./nginx
    container_name: nginx    
    networks:
      - node-network
    ports:
      - '8080:8080'
    depends_on:
      - db
      - app

networks:
  node-network:
    driver: bridge
